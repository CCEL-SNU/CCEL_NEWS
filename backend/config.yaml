# --- Categories for classification ---
categories:
  - id: "dft"
    label: "DFT / Comp. Chem."
    keywords: ["density functional", "DFT", "first-principles", "ab initio", "VASP", "exchange-correlation", "pseudopotential", "plane wave"]
  - id: "catalysis"
    label: "Catalysis"
    keywords: ["catalysis", "catalyst", "catalytic", "adsorption", "reaction mechanism", "scaling relation", "descriptor", "volcano plot", "turnover frequency"]
  - id: "electrochemistry"
    label: "Electrochem / FC"
    keywords: ["electrochemical", "fuel cell", "PEMFC", "SOFC", "ORR", "OER", "HER", "electrocatalyst", "overpotential", "electrode"]
  - id: "battery"
    label: "Battery"
    keywords: ["battery", "lithium", "sodium", "solid-state electrolyte", "cathode", "anode", "intercalation", "SEI", "electrolyte"]
  - id: "ml"
    label: "ML / MLIP"
    keywords: ["machine learning", "neural network", "deep learning", "force field", "interatomic potential", "MLIP", "GNN", "equivariant", "active learning", "Bayesian"]
  - id: "policy"
    label: "Industry / Policy"
    keywords: ["hydrogen economy", "green hydrogen", "energy policy", "carbon neutral", "commercialization", "market", "investment", "government"]

# --- Downloader Settings ---
downloader:
  max_papers_per_day: 9999
  delay_between_requests_sec: 8
  timeout_sec: 30
  pdf_directory: "./data/papers"
  user_agent: "CCEL-DailyNews/1.0 (Seoul National University; academic research)"

# --- Gemini API Settings ---
summarizer:
  model: "gemini-2.5-flash"    # 변경
  max_tokens: 10000
  temperature: 0.3

# --- Output ---
output:
  json_path: "./data/news.json"
  history_dir: "./data/history"

# --- Schedule ---
schedule:
  collect_time: "07:00"
  summarize_time: "07:30"
  weekly_digest_day: "Sunday"
  days_back: 365 # days
  openalex_days_back: 730 # OpenAlex group tracking: 2 years
