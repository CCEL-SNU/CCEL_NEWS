    - "heterogeneous catalysis DFT"
    - "machine learning interatomic potential"
    - "PEMFC catalyst"
    - "oxygen reduction reaction catalyst"
    - "oxygen evolution reaction"
    - "solid oxide fuel cell catalyst"
    - "electrochemical CO2 reduction"
    - "single atom catalyst"
    - "high entropy alloy catalyst"
    - "solid state battery electrolyte"
    - "lithium ion battery cathode DFT"
    - "machine learning force field"
    - "graph neural network potential"
    - "active learning molecular dynamics"
    - "scaling relations catalysis"
  secondary:
    - "density functional theory surface"
    - "ab initio molecular dynamics catalysis"
    - "neural network potential"
    - "equivariant neural network"
    - "hydrogen evolution reaction"
    - "nitrogen reduction reaction"
    - "perovskite catalyst"
    - "metal organic framework catalysis"

